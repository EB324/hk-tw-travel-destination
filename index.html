      {n:"Kiribati",la:1.87,ln:-157.36,h:1,t:0,hv:"V",hs:"3 months"},
      {n:"Kuwait",la:29.31,ln:47.48,h:1,t:0,hv:"A",hs:"3 months"},
      {n:"Kyrgyzstan",la:41.2,ln:74.77,h:1,t:0,hv:"V",hs:"30 days"},
      {n:"Mali",la:17.57,ln:-4,h:1,t:0,hv:"V",hs:"—"},
      {n:"Mexico",la:23.63,ln:-102.55,h:1,t:0,hv:"V",hs:"90 days"},
      {n:"Moldova",la:47.41,ln:28.37,h:1,t:0,hv:"V",hs:"90 days"},
      {n:"Morocco",la:31.79,ln:-7.09,h:1,t:0,hv:"V",hs:"30 days"},
      {n:"Niger",la:17.61,ln:8.08,h:1,t:0,hv:"V",hs:"14 days"},
      {n:"Papua New Guinea",la:-6.31,ln:143.96,h:1,t:0,hv:"V",hs:"—"},
      {n:"Serbia",la:44.02,ln:21.01,h:1,t:0,hv:"V",hs:"14 days"},
      {n:"South Africa",la:-30.56,ln:22.94,h:1,t:0,hv:"V",hs:"30 days"},
      {n:"Tonga",la:-21.18,ln:-175.2,h:1,t:0,hv:"A",hs:"1 month"},
      {n:"Trinidad & Tobago",la:10.69,ln:-61.22,h:1,t:0,hv:"V",hs:"—"},
      {n:"Tunisia",la:33.89,ln:9.54,h:1,t:0,hv:"V",hs:"3 months"},
      {n:"Uruguay",la:-32.52,ln:-55.77,h:1,t:0,hv:"V",hs:"90 days"},
      {n:"Venezuela",la:6.42,ln:-66.59,h:1,t:0,hv:"V",hs:"90 days"},
      {n:"Yemen",la:15.55,ln:48.52,h:1,t:0,hv:"V",hs:"30 days"},
      // Taiwan only
      {n:"Australia",la:-25.27,ln:133.78,h:0,t:1,tv:"E",ts:"3 months"},
      {n:"Bhutan",la:27.51,ln:90.43,h:0,t:1,tv:"E",ts:"90 days"},
      {n:"Cambodia",la:12.57,ln:104.99,h:0,t:1,tv:"A",ts:"30 days"},
      {n:"Costa Rica",la:9.75,ln:-83.75,h:0,t:1,tv:"V",ts:"30 days"},
      {n:"Eswatini",la:-26.52,ln:31.47,h:0,t:1,tv:"V",ts:"90 days"},
      {n:"Gambia",la:13.44,ln:-15.31,h:0,t:1,tv:"V",ts:"—"},
      {n:"Guatemala",la:15.78,ln:-90.23,h:0,t:1,tv:"V",ts:"30–90 days"},
      {n:"Haiti",la:18.97,ln:-72.29,h:0,t:1,tv:"V",ts:"90 days"},
      {n:"Honduras",la:15.2,ln:-86.24,h:0,t:1,tv:"V",ts:"90 days"},
      {n:"India",la:20.59,ln:78.96,h:0,t:1,tv:"E",ts:"—"},
      {n:"Kosovo",la:42.6,ln:20.9,h:0,t:1,tv:"V",ts:"90 days"},
      {n:"Marshall Islands",la:7.13,ln:171.18,h:0,t:1,tv:"V",ts:"90 days"},
      {n:"Paraguay",la:-23.44,ln:-58.44,h:0,t:1,tv:"V",ts:"90 days"},
      {n:"Sri Lanka",la:7.87,ln:80.77,h:0,t:1,tv:"A",ts:"30 days"},
      {n:"Tajikistan",la:38.86,ln:71.28,h:0,t:1,tv:"A",ts:"45 days"},
      {n:"United States",la:37.09,ln:-95.71,h:0,t:1,tv:"V",ts:"90 days"},
      {n:"Vietnam",la:14.06,ln:108.28,h:0,t:1,tv:"E",ts:"90 days"},
    ].map(c => ({ name:c.n, lat:c.la, lng:c.ln, hk:!!c.h, tw:!!c.t, hv:c.hv||null, hs:c.hs||null, tv:c.tv||null, ts:c.ts||null }));

    const countries = C;
    const VISA_LABELS = { V:"Visa-free", A:"Visa on arrival", E:"eVisa", T:"eTA" };
    const VISA_COLORS = { V:"#34d399", A:"#a78bfa", E:"#38bdf8", T:"#fb923c" };

    function getCat(c) { return c.hk && c.tw ? "both" : c.hk ? "hkOnly" : "twOnly"; }

    const TOPO = "https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json";

    // Regions for quick-jump zoom
    const REGIONS = [
      { label:"🌍 World",   lat:0, lng:0, z:1 },
      { label:"Europe",     lat:50, lng:15, z:3.5 },
      { label:"SE Asia",    lat:10, lng:110, z:3 },
      { label:"E Asia",     lat:35, lng:120, z:2.8 },
      { label:"Middle East", lat:28, lng:45, z:3.2 },
      { label:"Africa",     lat:2, lng:22, z:2 },
      { label:"Caribbean",  lat:17, lng:-65, z:4 },
      { label:"S America",  lat:-20, lng:-60, z:2 },
      { label:"Pacific",    lat:-5, lng:160, z:2.5 },
    ];

    function App() {
      const [filter, setFilter] = useState("all");
      const [selected, setSelected] = useState(null);
      const [search, setSearch] = useState("");
      const [geo, setGeo] = useState(null);
      const [transform, setTransform] = useState({ k:1, x:0, y:0 });
      const svgRef = useRef(null);
      const gRef = useRef(null);
      const zoomRef = useRef(null);

      const W = 960, H = 620;

      // Load topo
      useEffect(() => {
        fetch(TOPO).then(r=>r.json()).then(topo => {
          const obj=topo.objects.countries, arcs=topo.arcs, tr=topo.transform;
          function da(idx){const rev=idx<0,arc=arcs[rev?~idx:idx],pts=[];let x=0,y=0;for(const[dx,dy]of arc){x+=dx;y+=dy;pts.push([x*tr.scale[0]+tr.translate[0],y*tr.scale[1]+tr.translate[1]]);}if(rev)pts.reverse();return pts;}
          function dr(ring){return ring.flatMap(i=>da(i));}
          function dg(g){if(g.type==="Polygon")return{type:"Polygon",coordinates:g.arcs.map(dr)};if(g.type==="MultiPolygon")return{type:"MultiPolygon",coordinates:g.arcs.map(p=>p.map(dr))};return g;}
          setGeo({type:"FeatureCollection",features:obj.geometries.map(g=>({type:"Feature",properties:g.properties||{},geometry:dg(g)}))});
        }).catch(()=>{});
      }, []);

      // D3 zoom on SVG
      useEffect(() => {
        if (!svgRef.current) return;
        const svg = d3.select(svgRef.current);
        const zoom = d3.zoom()
          .scaleExtent([1, 12])
          .on("zoom", (e) => {
            setTransform({ k: e.transform.k, x: e.transform.x, y: e.transform.y });
          });
        svg.call(zoom);
        zoomRef.current = zoom;
        svg.on("dblclick.zoom", () => {
          svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
        });
        return () => { svg.on(".zoom", null); };
      }, []);

      // Zoom to a specific region
      const zoomToRegion = useCallback((region) => {
        if (!svgRef.current || !zoomRef.current) return;
        const svg = d3.select(svgRef.current);
        if (region.z === 1) {
          svg.transition().duration(500).call(zoomRef.current.transform, d3.zoomIdentity);
          return;
        }
        const pos = proj([region.lng, region.lat]);
        if (!pos) return;
        const [cx, cy] = pos;
        const k = region.z;
        const tx = W / 2 - cx * k;
        const ty = H / 2 - cy * k;
        svg.transition().duration(500).call(
          zoomRef.current.transform,
          d3.zoomIdentity.translate(tx, ty).scale(k)
        );
      }, []);

      // Zoom to a specific country when selected from the list
      const zoomToCountry = useCallback((country) => {
        if (!svgRef.current || !zoomRef.current) return;
        const svg = d3.select(svgRef.current);
        const pos = proj([country.lng, country.lat]);
        if (!pos) return;
        const [cx, cy] = pos;
        const k = 5;
        const tx = W / 2 - cx * k;
        const ty = H / 2 - cy * k;
        svg.transition().duration(500).call(
          zoomRef.current.transform,
          d3.zoomIdentity.translate(tx, ty).scale(k)
        );
      }, []);

      const proj = useMemo(() => d3.geoNaturalEarth1().scale(195).translate([W/2, H/2]), []);
      const path = useMemo(() => d3.geoPath().projection(proj), [proj]);

      const filtered = useMemo(() => {
        let l = countries;
        if (filter !== "all") l = l.filter(c => getCat(c) === filter);
        if (search) l = l.filter(c => c.name.toLowerCase().includes(search.toLowerCase()));
        return l;
      }, [filter, search]);

      const counts = useMemo(() => {
        const b = countries.filter(c=>c.hk&&c.tw).length;
        const ho = countries.filter(c=>c.hk&&!c.tw).length;
        const to = countries.filter(c=>!c.hk&&c.tw).length;
        return { b, ho, to, all: countries.length };
      }, []);

      const stats = [
        {l:"Overlap",v:counts.b,c:"#34d399",k:"both"},
        {l:"HK only",v:counts.ho,c:"#60a5fa",k:"hkOnly"},
        {l:"TW only",v:counts.to,c:"#fbbf24",k:"twOnly"},
        {l:"Total",v:counts.all,c:"#94a3b8",k:"all"},
      ];

      const sel = selected ? countries.find(c => c.name === selected) : null;
      const selCat = sel ? getCat(sel) : null;

      const tStr = "translate("+transform.x+","+transform.y+") scale("+transform.k+")";

      // Visa badge
      function badge(type, stay, label) {
        if (!type) return h("div",{style:{color:"#475569",fontSize:12}},"Visa required");
        const col = VISA_COLORS[type] || "#94a3b8";
        return h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4}},
          h("span",{style:{background:col+"22",color:col,border:"1px solid "+col+"44",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600}},VISA_LABELS[type]||type),
          stay && stay !== "—" ? h("span",{style:{color:"#94a3b8",fontSize:12}},stay) : null
        );
      }

      return h("div",{style:{minHeight:"100vh",background:"#0b1120",color:"#e2e8f0",fontFamily:"'DM Sans',sans-serif",padding:"20px 12px"}},
        h("div",{style:{maxWidth:960,margin:"0 auto"}},
          h("h1",{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:"clamp(17px,4vw,26px)",fontWeight:700,margin:"0 0 2px",color:"#34d399"}},"🌏 Visa-Free Travel Overlap"),
          h("p",{style:{fontSize:12,color:"#475569",margin:"0 0 14px"}},"HKSAR Passport × Taiwan Passport — visa-free, VOA & eVisa"),

          // Stats
          h("div",{style:{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}},
            ...stats.map(s=>h("button",{key:s.k,onClick:()=>setFilter(filter===s.k?"all":s.k),style:{flex:"1 1 65px",minWidth:65,background:filter===s.k?s.c+"18":"#131b2e",border:"1.5px solid "+(filter===s.k?s.c:"#1c2740"),borderRadius:10,padding:"8px 10px",cursor:"pointer",color:s.c,textAlign:"left",transition:"all 0.15s"}},
              h("div",{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:"clamp(18px,4vw,24px)",fontWeight:700,lineHeight:1.1}},s.v),
              h("div",{style:{fontSize:10,color:"#526077",marginTop:2}},s.l)
            ))
          ),

          // Search
          h("input",{type:"text",placeholder:"Search country...",value:search,onChange:e=>{setSearch(e.target.value);setSelected(null);},style:{background:"#131b2e",border:"1px solid #1c2740",borderRadius:8,padding:"7px 12px",color:"#e2e8f0",fontSize:13,width:"100%",maxWidth:220,marginBottom:10,outline:"none"}}),

          // Region quick-jump
          h("div",{style:{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}},
            ...REGIONS.map(r=>h("button",{key:r.label,onClick:()=>zoomToRegion(r),style:{background:"#131b2e",border:"1px solid #1c2740",borderRadius:6,padding:"4px 10px",color:"#94a3b8",fontSize:11,cursor:"pointer",transition:"all 0.15s",whiteSpace:"nowrap"}},r.label))
          ),

          // Map
          h("div",{style:{background:"#0d1526",borderRadius:12,border:"1px solid #1c2740",overflow:"hidden",position:"relative",touchAction:"none",minHeight:"55vw"}},
            h("svg",{ref:svgRef,viewBox:"0 0 "+W+" "+H,style:{width:"100%",height:"auto",display:"block",touchAction:"none",minHeight:"55vw"}},
              h("defs",null,h("radialGradient",{id:"oc"},h("stop",{offset:"0%",stopColor:"#111d35"}),h("stop",{offset:"100%",stopColor:"#0b1120"}))),
              h("rect",{width:W,height:H,fill:"#0b1120"}),
              h("g",{ref:gRef,transform:tStr},
                h("path",{d:path({type:"Sphere"}),fill:"url(#oc)",stroke:"#1c2740",strokeWidth:0.8}),
                h("path",{d:path(d3.geoGraticule10()),fill:"none",stroke:"#151f35",strokeWidth:0.3}),
                geo ? geo.features.map((f,i)=>h("path",{key:i,d:path(f),fill:"#1a2744",stroke:"#2a3a5c",strokeWidth:0.4})) : null,
                // Dots — scale inversely with zoom
                ...["hkOnly","twOnly","both"].flatMap(cat=>
                  filtered.filter(c=>getCat(c)===cat).map(c=>{
                    const pos=proj([c.lng,c.lat]);if(!pos)return null;
                    const[x,y]=pos,col=CAT[cat].color,isSel=selected===c.name;
                    const invScale = 1 / Math.sqrt(transform.k);
                    const r = (isSel ? 8 : 5.5) * invScale;
                    const sw = (isSel ? 1.5 : 0.6) * invScale;
                    return h("g",{key:c.name,onClick:(e)=>{e.stopPropagation();setSelected(selected===c.name?null:c.name);},style:{cursor:"pointer"}},
                      h("circle",{cx:x,cy:y,r:r+8*invScale,fill:col,opacity:isSel?.25:.1}),
                      h("circle",{cx:x,cy:y,r,fill:col,stroke:isSel?"#fff":"#0b1120",strokeWidth:sw,opacity:.95}),
                      isSel && transform.k > 2 ? h("text",{x:x+r+4*invScale,y:y+4*invScale,fill:"#f1f5f9",fontSize:11*invScale,fontFamily:"'DM Sans',sans-serif",fontWeight:600},c.name) : null
                    );
                  })
                )
              )
            ),
            !geo?h("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#3b4f6b",fontSize:13}},"Loading world map..."):null,
            // Zoom hint
            h("div",{style:{position:"absolute",bottom:6,right:10,fontSize:9,color:"#334155"}},"Pinch to zoom · Double-tap to reset")
          ),

          // Legend
          h("div",{style:{display:"flex",gap:14,marginTop:8,fontSize:11,color:"#526077",flexWrap:"wrap"}},
            ...Object.entries(CAT).map(([k,v])=>h("div",{key:k,style:{display:"flex",alignItems:"center",gap:5}},h("span",{style:{width:8,height:8,borderRadius:"50%",background:v.color,display:"inline-block"}}),v.label))
          ),

          // Detail panel
          sel ? h("div",{style:{marginTop:14,background:"#111827",border:"1px solid "+CAT[selCat].color+"44",borderRadius:12,padding:"16px 18px",position:"relative"}},
            h("button",{onClick:()=>setSelected(null),style:{position:"absolute",top:10,right:14,background:"none",border:"none",color:"#64748b",fontSize:18,cursor:"pointer"}},"✕"),
            h("div",{style:{fontSize:18,fontWeight:700,color:CAT[selCat].color,marginBottom:10,fontFamily:"'JetBrains Mono',monospace"}},sel.name),
            h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
              // HK column
              h("div",null,
                h("div",{style:{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:6}},"🇭🇰 HKSAR Passport"),
                sel.hk ? badge(sel.hv, sel.hs, "HK") : h("div",{style:{color:"#ef4444",fontSize:12,fontWeight:500}},"❌ Visa required")
              ),
              // TW column
              h("div",null,
                h("div",{style:{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:6}},"🇹🇼 Taiwan Passport"),
                sel.tw ? badge(sel.tv, sel.ts, "TW") : h("div",{style:{color:"#ef4444",fontSize:12,fontWeight:500}},"❌ Visa required")
              )
            )
          ) : null,

          // Country list
          h("div",{style:{marginTop:18,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:3,maxHeight:280,overflowY:"auto"}},
            ...filtered.sort((a,b)=>a.name.localeCompare(b.name)).map(c=>{
              const cat=getCat(c),col=CAT[cat].color;
              return h("div",{key:c.name,onClick:()=>{const newSel=selected===c.name?null:c.name;setSelected(newSel);if(newSel){const co=countries.find(x=>x.name===newSel);if(co)zoomToCountry(co);}},style:{display:"flex",alignItems:"center",gap:7,padding:"4px 8px",borderRadius:5,background:selected===c.name?col+"15":"transparent",fontSize:12,cursor:"pointer"}},
                h("span",{style:{width:6,height:6,borderRadius:"50%",background:col,flexShrink:0}}),
                h("span",{style:{color:"#b0bdd0"}},c.name)
              );
            })
          ),

          h("p",{style:{fontSize:10,color:"#2a3650",marginTop:18,lineHeight:1.5}},"Sources: HK Immigration Dept (2026-02-02) · Taiwan BOCA (2026-03-04). Includes visa-free, VOA & eVisa. Verify before travel.")
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
