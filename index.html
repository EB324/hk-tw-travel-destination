    function getCategory(c) {
      if (c.hk && c.tw) return "both";
      if (c.hk) return "hkOnly";
      return "twOnly";
    }

    const TOPO_URL = "https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json";

    function App() {
      const [filter, setFilter] = useState("all");
      const [selected, setSelected] = useState(null);
      const [searchTerm, setSearchTerm] = useState("");
      const [worldGeo, setWorldGeo] = useState(null);

      const W = 960, H = 500;

      useEffect(() => {
        fetch(TOPO_URL).then(r => r.json()).then(topo => {
          const obj = topo.objects.countries, arcs = topo.arcs, tr = topo.transform;
          function decodeArc(idx) {
            const rev = idx < 0, arc = arcs[rev ? ~idx : idx], pts = [];
            let x = 0, y = 0;
            for (const [dx, dy] of arc) { x += dx; y += dy; pts.push([x * tr.scale[0] + tr.translate[0], y * tr.scale[1] + tr.translate[1]]); }
            if (rev) pts.reverse(); return pts;
          }
          function decodeRing(ring) { return ring.flatMap(i => decodeArc(i)); }
          function decodeGeom(g) {
            if (g.type === "Polygon") return { type: "Polygon", coordinates: g.arcs.map(decodeRing) };
            if (g.type === "MultiPolygon") return { type: "MultiPolygon", coordinates: g.arcs.map(p => p.map(decodeRing)) };
            return g;
          }
          setWorldGeo({ type: "FeatureCollection", features: obj.geometries.map(g => ({ type: "Feature", properties: g.properties || {}, geometry: decodeGeom(g) })) });
        }).catch(() => {});
      }, []);

      const projection = useMemo(() => d3.geoNaturalEarth1().scale(160).translate([W / 2, H / 2]), []);
      const pathGen = useMemo(() => d3.geoPath().projection(projection), [projection]);

      const filtered = useMemo(() => {
        let list = countries;
        if (filter !== "all") list = list.filter(c => getCategory(c) === filter);
        if (searchTerm) list = list.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()));
        return list;
      }, [filter, searchTerm]);

      const counts = useMemo(() => {
        const both = countries.filter(c => c.hk && c.tw).length;
        const hkOnly = countries.filter(c => c.hk && !c.tw).length;
        const twOnly = countries.filter(c => !c.hk && c.tw).length;
        return { both, hkOnly, twOnly, total: countries.length };
      }, []);

      const stats = [
        { label: "Overlap", value: counts.both, color: "#34d399", key: "both" },
        { label: "HK only", value: counts.hkOnly, color: "#60a5fa", key: "hkOnly" },
        { label: "TW only", value: counts.twOnly, color: "#fbbf24", key: "twOnly" },
        { label: "Total", value: counts.total, color: "#94a3b8", key: "all" },
      ];

      const spherePath = pathGen({ type: "Sphere" });
      const graticulePath = pathGen(d3.geoGraticule10());

      // Build land paths
      const landPaths = worldGeo ? worldGeo.features.map((f, i) =>
        h("path", { key: i, d: pathGen(f), fill: "#1a2744", stroke: "#2a3a5c", strokeWidth: 0.4 })
      ) : [];

      // Build dots
      const dotLayers = ["hkOnly", "twOnly", "both"].flatMap(cat =>
        filtered.filter(c => getCategory(c) === cat).map(c => {
          const pos = projection([c.lng, c.lat]);
          if (!pos) return null;
          const [x, y] = pos;
          const col = CATEGORIES[cat].color;
          const isSel = selected === c.name;
          const r = isSel ? 6.5 : 4.5;
          const labelX = x > W - 150 ? x - c.name.length * 7 - 24 : x + 10;
          const textX = x > W - 150 ? x - c.name.length * 7 - 15 : x + 19;
          return h("g", { key: c.name, onClick: () => setSelected(selected === c.name ? null : c.name), style: { cursor: "pointer" } },
            h("circle", { cx: x, cy: y, r: r + 6, fill: col, opacity: isSel ? 0.2 : 0.1 }),
            h("circle", { cx: x, cy: y, r, fill: col, stroke: isSel ? "#fff" : "#0b1120", strokeWidth: isSel ? 1.5 : 0.6, opacity: 0.95 }),
            isSel ? h("g", null,
              h("rect", { x: labelX, y: y - 20, width: c.name.length * 7 + 18, height: 24, rx: 6, fill: "#0f1b30", stroke: col, strokeWidth: 1 }),
              h("text", { x: textX, y: y - 4, fill: "#f1f5f9", fontSize: 11, fontFamily: "'DM Sans', sans-serif", fontWeight: 500 }, c.name)
            ) : null
          );
        })
      );

      return h("div", { style: { minHeight: "100vh", background: "#0b1120", color: "#e2e8f0", fontFamily: "'DM Sans', sans-serif", padding: "20px 12px" } },
        h("div", { style: { maxWidth: 960, margin: "0 auto" } },

          // Title
          h("h1", { style: { fontFamily: "'JetBrains Mono', monospace", fontSize: "clamp(17px, 4vw, 26px)", fontWeight: 700, margin: "0 0 2px", color: "#34d399" } }, "🌏 Visa-Free Travel Overlap"),
          h("p", { style: { fontSize: 12, color: "#475569", margin: "0 0 14px" } }, "HKSAR Passport × Taiwan Passport — visa-free, VOA & eVisa"),

          // Stats
          h("div", { style: { display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" } },
            ...stats.map(s =>
              h("button", {
                key: s.key,
                onClick: () => setFilter(filter === s.key ? "all" : s.key),
                style: {
                  flex: "1 1 65px", minWidth: 65, background: filter === s.key ? s.color + "18" : "#131b2e",
                  border: "1.5px solid " + (filter === s.key ? s.color : "#1c2740"), borderRadius: 10,
                  padding: "8px 10px", cursor: "pointer", color: s.color, textAlign: "left", transition: "all 0.15s",
                }
              },
                h("div", { style: { fontFamily: "'JetBrains Mono', monospace", fontSize: "clamp(18px, 4vw, 24px)", fontWeight: 700, lineHeight: 1.1 } }, s.value),
                h("div", { style: { fontSize: 10, color: "#526077", marginTop: 2 } }, s.label)

          ),

          // Search
          h("input", {
            type: "text", placeholder: "Search country...", value: searchTerm,
            onChange: e => { setSearchTerm(e.target.value); setSelected(null); },
            style: { background: "#131b2e", border: "1px solid #1c2740", borderRadius: 8, padding: "7px 12px", color: "#e2e8f0", fontSize: 13, width: "100%", maxWidth: 220, marginBottom: 10, outline: "none" }

          // Map
          h("div", { style: { background: "#0d1526", borderRadius: 12, border: "1px solid #1c2740", overflow: "hidden", position: "relative" } },
            h("svg", { viewBox: "0 0 " + W + " " + H, style: { width: "100%", height: "auto", display: "block" } },
              h("defs", null,
                h("radialGradient", { id: "ocean" },
                  h("stop", { offset: "0%", stopColor: "#111d35" }),
                  h("stop", { offset: "100%", stopColor: "#0b1120" })
                )
              ),
              h("path", { d: spherePath, fill: "url(#ocean)", stroke: "#1c2740", strokeWidth: 0.8 }),
              h("path", { d: graticulePath, fill: "none", stroke: "#151f35", strokeWidth: 0.3 }),
              ...landPaths,
              ...dotLayers.filter(Boolean)
            ),
            !worldGeo ? h("div", { style: { position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", color: "#3b4f6b", fontSize: 13 } }, "Loading world map...") : null
          ),

          // Legend
          h("div", { style: { display: "flex", gap: 14, marginTop: 8, fontSize: 11, color: "#526077", flexWrap: "wrap" } },
            ...Object.entries(CATEGORIES).map(([k, v]) =>
              h("div", { key: k, style: { display: "flex", alignItems: "center", gap: 5 } },
                h("span", { style: { width: 8, height: 8, borderRadius: "50%", background: v.color, display: "inline-block" } }),
                v.label
              )
            ),
            h("span", { style: { marginLeft: "auto", fontSize: 10 } }, "Tap a dot to see name")
          ),

          // Country list
          h("div", { style: { marginTop: 18, display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(170px, 1fr))", gap: 3, maxHeight: 280, overflowY: "auto" } },
            ...filtered.sort((a, b) => a.name.localeCompare(b.name)).map(c => {
              const cat = getCategory(c), col = CATEGORIES[cat].color;
              return h("div", {
                key: c.name,
                onClick: () => setSelected(selected === c.name ? null : c.name),
                style: { display: "flex", alignItems: "center", gap: 7, padding: "4px 8px", borderRadius: 5, background: selected === c.name ? col + "15" : "transparent", fontSize: 12, cursor: "pointer" }
              },
                h("span", { style: { width: 6, height: 6, borderRadius: "50%", background: col, flexShrink: 0 } }),
                h("span", { style: { color: "#b0bdd0" } }, c.name)
              );
            })
          ),

          // Footer
          h("p", { style: { fontSize: 10, color: "#2a3650", marginTop: 18, lineHeight: 1.5 } },
            "Sources: HK Immigration Dept (2026-02-02) · Taiwan BOCA (2026-03-04). Includes visa-free, VOA & eVisa. Verify before travel."
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
